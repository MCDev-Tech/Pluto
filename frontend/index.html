<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pluto MC 映射查询</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-shell">
    <main class="linkie-layout">
      <aside class="left-menu">
        <div class="top-brand">
          <h1>Pluto 映射查询</h1>
          <p id="api-version"></p>
        </div>

        <div class="menu-group">
          <small>版本</small>
          <input list="versions" id="version" value="1.21.10" spellcheck="false" />
          <datalist id="versions">
            <option value="1.20.1"></option>
            <option value="1.21.1"></option>
            <option value="1.21.10"></option>
          </datalist>
        </div>

        <div class="menu-group">
          <small>命名空间</small>
          <select id="mappingType">
            <option value="official">Mojang 官方</option>
            <option value="yarn">Yarn</option>
          </select>
        </div>

        <div class="menu-group">
          <small>翻译</small>
          <select id="translateType">
            <option value="">不转换</option>
            <option value="official">转换到 Official</option>
            <option value="yarn">转换到 Yarn</option>
          </select>
        </div>

        <div class="menu-group">
          <small>筛选元素</small>
          <label><input type="checkbox" id="filterClass" checked /> 类</label>
          <label><input type="checkbox" id="filterMethod" checked /> 方法</label>
          <label><input type="checkbox" id="filterField" checked /> 字段</label>
        </div>

        <div class="menu-group">
          <small>关键词搜索</small>
          <input id="keyword" type="text" placeholder="搜索关键词，例如 ItemProperties" spellcheck="false" />
          <button id="searchBtn" class="btn primary">搜索</button>
          <div id="sideStatus" class="status">等待查询</div>
        </div>
      </aside>

      <section class="right-content">
        <div class="result-status" id="searchStatus">未查询</div>
        <div id="resultList" class="result-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
